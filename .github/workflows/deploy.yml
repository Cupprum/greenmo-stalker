name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    paths:
      - 'template.yaml'
      - 'run.sh'
      - 'deploy.sh'
      - 'function/**'
      - '.github/workflows/**'

permissions:
  id-token: write   # Required for JWT
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run tests
        run: |
          ./run.sh test

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.GREENMO_AWS_ACCOUNT }}:role/greenmo-stalker-oidc
          aws-region: ${{ vars.GREENMO_AWS_REGION }}

      - name: Build and deploy
        run: |
          ./deploy.sh
        env:
          GREENMO_OPEN_MAPS_API_TOKEN: ${{ secrets.GREENMO_OPEN_MAPS_API_TOKEN }}
          GREENMO_AWS_REGION: ${{ vars.GREENMO_AWS_REGION }}
