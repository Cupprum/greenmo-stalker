name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    paths:
      - 'template.yaml'
      - 'run.sh'
      - 'deploy.sh'
      - 'function/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run tests
        run: |
          ./run.sh test

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build and deploy
        run: |
          ./deploy.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GREENMO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GREENMO_AWS_SECRET_ACCESS_KEY }}
          GREENMO_OPEN_MAPS_API_TOKEN: ${{ secrets.GREENMO_OPEN_MAPS_API_TOKEN }}
          GREENMO_AWS_REGION: ${{ vars.GREENMO_AWS_REGION }}